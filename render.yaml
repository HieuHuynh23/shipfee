# ShipFee API on Render — Blueprint (optional).
# Persistent Disk yêu cầu gói trả phí (Starter+). Free tier không hỗ trợ disk.
# Nếu giữ Free: dựa vào hydrate/sync Supabase (đã có trong server.js).
#
# Cách bật disk trên Dashboard (khuyến nghị nếu nâng gói):
# 1. Render → shipfee service → Disks → Add Disk
# 2. Mount Path: /var/data
# 3. Environment → thêm DATA_DIR=/var/data
# 4. Redeploy
#
# File JSON runtime (orders, shippers, CRM helpers) sẽ ghi vào DATA_DIR.

services:
  - type: web
    name: shipfee-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: NODE_VERSION
        value: "24"
    # Uncomment when on a paid plan that supports disks:
    # disk:
    #   name: shipfee-data
    #   mountPath: /var/data
    #   sizeGB: 1
